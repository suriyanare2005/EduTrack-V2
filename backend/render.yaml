services:
  - type: web
    name: edutrack-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        value: ""
      - key: CORS_ORIGINS
        value: ""
      - key: FRONTEND_URL
        value: ""
      - key: PORT
        value: "8000"
